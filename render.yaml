services:
  - type: web
    name: ats-resume-analyzer-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: ohio
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PORT
        value: "8080"
