name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

defaults:
  run:
    working-directory: backend

jobs:
  build:
    name: Maven verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & verify (skip tests needing DB)
        run: mvn verify -DskipTests --batch-mode --no-transfer-progress

      - name: Verify Docker image builds
        run: docker build -t ats-analyzer:ci .

      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: ats-analyzer-jar
          path: backend/target/*.jar
          retention-days: 7
